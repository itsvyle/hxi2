syntax = "proto3";
package auth.v2;

import "auth/v2/permissions.proto";

message SmallData {
    int64 user_id = 1;
    string username = 2;
    string first_name = 3;
    string last_name = 4;
    int32 permissions = 5;
    int32 promotion = 6;
}

message JwtClaims {
    string sub = 1;
    bool temporary = 2;
    int64 temporary_recheck_after = 3;
    SmallData data = 4;
}
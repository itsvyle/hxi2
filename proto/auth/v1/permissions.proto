syntax = "proto3";
package auth.v1;

import "google/protobuf/descriptor.proto";

extend google.protobuf.MethodOptions {
    optional Permissions permission_level = 50007;
}
extend google.protobuf.ServiceOptions {
    optional Permissions permission_level_service = 50008;
}

message Permissions {
    repeated PermissionLevel allow_role = 1;
    optional bool is_public = 2;
    optional string public_url = 3;
}

enum PermissionLevel {
    PERMISSION_UNSPECIFIED = 0;
    ADMIN = 1;
    STUDENT = 2;
    TEACHER = 3;
}

service UserServiceAuth {
    rpc Delete(DeleteUserRequest) returns (DeleteUserResponse) {
        option (permission_level).allow_role = ADMIN;
    }

    rpc AnyoneQuery(DeleteUserRequest) returns (DeleteUserResponse) {}
}

message DeleteUserRequest {
    string user_id = 1;
}

message DeleteUserResponse {
    bool success = 1;
}